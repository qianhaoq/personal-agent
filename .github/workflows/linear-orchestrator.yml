name: Linear Orchestrator

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Command to run"
        type: choice
        required: true
        default: scan
        options:
          - scan
          - triage
          - monitor
          - run
          - auto
          - doctor
      apply:
        description: "Allow Linear writes for triage/monitor"
        type: boolean
        required: false
        default: false
      issue:
        description: "Optional Linear issue key for run mode"
        type: string
        required: false
      execute_agent:
        description: "Actually invoke the coding agent in run mode"
        type: boolean
        required: false
        default: false
      allow_high_risk_run:
        description: "Allow guarded security/trading draft-PR work"
        type: boolean
        required: false
        default: false
      auto_merge:
        description: "Arm auto-merge for eligible low-risk PRs in monitor mode"
        type: boolean
        required: false
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: linear-orchestrator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      ORCHESTRATOR_GH_TOKEN: ${{ secrets.ORCHESTRATOR_GH_TOKEN }}
      GH_TOKEN: ${{ secrets.ORCHESTRATOR_GH_TOKEN || github.token }}
      GITHUB_TOKEN: ${{ secrets.ORCHESTRATOR_GH_TOKEN || github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.CODEX_API_KEY }}
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY || secrets.OPENAI_API_KEY }}
      CODEX_OAUTH_ACCESS_TOKEN: ${{ secrets.CODEX_OAUTH_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Install Codex CLI for agent execution
        run: |
          if [ -n "${OPENAI_API_KEY:-}" ] || [ -n "${CODEX_API_KEY:-}" ] || [ -n "${CODEX_OAUTH_ACCESS_TOKEN:-}" ]; then
            npm install -g @openai/codex@0.137.0
            codex --version
          else
            echo "Skipping Codex CLI install: no unattended Codex credentials configured."
          fi

      - name: Scheduled safe automation
        if: github.event_name == 'schedule'
        run: |
          source .venv/bin/activate
          if ! python -m linear_orchestrator.cli --json doctor --require-linear --require-github; then
            {
              echo "## Linear Orchestrator skipped"
              echo
              echo "Required credentials are not configured yet."
              echo
              echo "- Add repository secret LINEAR_API_KEY."
              echo "- Optional for cross-repository PR checks: add ORCHESTRATOR_GH_TOKEN."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python -m linear_orchestrator.cli --json auto --apply --execute-agent --auto-merge --max-runs 1

      - name: Manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          source .venv/bin/activate
          mode="${{ inputs.mode }}"
          apply_flag=""
          execute_flag=""
          issue_flag=""
          risk_flag=""
          auto_merge_flag=""
          if [ "${{ inputs.apply }}" = "true" ]; then
            apply_flag="--apply"
          fi
          if [ "${{ inputs.execute_agent }}" = "true" ]; then
            execute_flag="--execute-agent"
          fi
          if [ -n "${{ inputs.issue }}" ]; then
            issue_flag="--issue ${{ inputs.issue }}"
          fi
          if [ "${{ inputs.allow_high_risk_run }}" = "true" ]; then
            risk_flag="--allow-high-risk-run"
          fi
          if [ "${{ inputs.auto_merge }}" = "true" ]; then
            auto_merge_flag="--auto-merge"
          fi

          case "$mode" in
            doctor)
              python -m linear_orchestrator.cli --json doctor
              ;;
            scan)
              python -m linear_orchestrator.cli --json scan
              ;;
            triage)
              python -m linear_orchestrator.cli --json triage $apply_flag
              ;;
            monitor)
              python -m linear_orchestrator.cli --json monitor $apply_flag $auto_merge_flag
              ;;
            run)
              python -m linear_orchestrator.cli --json run $issue_flag $execute_flag $risk_flag
              ;;
            auto)
              python -m linear_orchestrator.cli --json auto $apply_flag $execute_flag $auto_merge_flag --max-runs 1
              ;;
          esac
